schema_version = 1

[module]
name = "naturalgrounding"
catalog = "public.list"
kind = "repo"
source = "https://github.com/safrano9999/NaturalGrounding-Tiktok-Ying-Video-Manager.git"
target_dir = "NaturalGrounding-Tiktok-Ying-Video-Manager"
env_ref = "CONTAINER/env_example"
runtime_ref = "CONTAINER/runtime.toml"
description = "NaturalGrounding TikTok video manager"
default_selected = true

[[persistence]]
path = "/opt/NaturalGrounding-Tiktok-Ying-Video-Manager/config"

[[persistence]]
path = "/opt/NaturalGrounding-Tiktok-Ying-Video-Manager/VIDEOS"

[[ports]]
internal = 850
publish_default = true
description = "NaturalGrounding WebUI"
env_key = "NATURALGROUNDING_PORT"

[[env]]
key = "HOST"
default = "0.0.0.0"
description = "Bind host"
shared_group = "bind_host"
aliases = ["NATURALGROUNDING_HOST"]

[[env]]
key = "NATURALGROUNDING_PORT"
default = "850"
description = "NaturalGrounding WebUI port"
aliases = ["APP_PORT", "PORT"]

[[env]]
key = "DB_BACKEND"
default = "postgres"
description = "postgres or mysql"

[[env]]
key = "DB_HOST"
default = "localhost"
description = "Database host"

[[env]]
key = "DB_PORT"
default = "5432"
description = "Database port"
default_from = "DB_BACKEND"
default_map = { mysql = "3306", mariadb = "3306", postgres = "5432", postgresql = "5432" }

[[env]]
key = "DB_NAME"
default = "build"
description = "Database name"

[[env]]
key = "DB_USER"
default = "build"
description = "Database user"

[[env]]
key = "DB_PW"
default = ""
description = "Database password"
required = true

[[env]]
key = "NG_CONFIG_FILE"
default = "/opt/NaturalGrounding-Tiktok-Ying-Video-Manager/config/db_config.env"
description = "Optional legacy DB config file path"

[[env]]
key = "VIDEOS_DIR"
default = "/opt/NaturalGrounding-Tiktok-Ying-Video-Manager/VIDEOS"
description = "Video storage directory"
